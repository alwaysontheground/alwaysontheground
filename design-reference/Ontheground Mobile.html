<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ontheground — mobile prototype</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: #2A2520;
  color: #1A1714;
  min-height: 100vh;
  font-family: 'Archivo', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(1200px 800px at 50% 30%, rgba(184,100,43,0.06), transparent 60%),
    radial-gradient(800px 600px at 30% 80%, rgba(244,239,230,0.04), transparent 60%);
}

.stage {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 48px;
  align-items: center;
  padding: 48px 56px;
}

.context {
  color: #F4EFE6;
  max-width: 360px;
  justify-self: end;
}
.context .brand {
  font-family: 'Archivo', sans-serif;
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.035em;
}
.context .brand .dot { color: #B8642B; }
.context .kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(244,239,230,0.55);
  margin-top: 32px;
}
.context h1 {
  font-family: 'Archivo', sans-serif;
  font-weight: 500;
  font-size: 44px; line-height: 0.98;
  letter-spacing: -0.035em;
  margin: 16px 0 0;
}
.context h1 em { font-style: italic; font-family: 'Source Serif 4', serif; font-weight: 400; color: rgba(244,239,230,0.7); }
.context p {
  font-family: 'Source Serif 4', serif;
  font-size: 15px; line-height: 1.6;
  color: rgba(244,239,230,0.7);
  margin: 24px 0 0;
}
.context .meta {
  margin-top: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(244,239,230,0.45);
  line-height: 1.8;
}

.screens-nav {
  justify-self: start;
  max-width: 320px;
  display: flex; flex-direction: column; gap: 4px;
}
.screens-nav .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(244,239,230,0.45);
  margin-bottom: 12px;
}
.screens-nav button {
  appearance: none;
  background: transparent;
  border: 1px solid rgba(244,239,230,0.12);
  color: #F4EFE6;
  text-align: left;
  padding: 14px 18px;
  cursor: pointer;
  font-family: 'Archivo', sans-serif;
  border-radius: 12px;
  display: grid; grid-template-columns: 24px 1fr; gap: 12px; align-items: center;
  transition: background 0.15s, border-color 0.15s;
}
.screens-nav button:hover { background: rgba(244,239,230,0.06); }
.screens-nav button[aria-pressed="true"] {
  background: rgba(244,239,230,0.08);
  border-color: rgba(184,100,43,0.5);
}
.screens-nav button .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.08em;
  color: rgba(244,239,230,0.45);
}
.screens-nav button[aria-pressed="true"] .num { color: #B8642B; }
.screens-nav button .name {
  font-size: 14px; font-weight: 500; letter-spacing: -0.01em;
}
.screens-nav button .desc {
  font-family: 'Source Serif 4', serif;
  font-size: 12px; color: rgba(244,239,230,0.5);
  margin-top: 2px;
}

.device-wrap {
  display: flex; align-items: center; justify-content: center;
}

.tab-bar-host { } /* reserved */

@media (max-width: 1100px) {
  .stage { grid-template-columns: 1fr; padding: 24px; gap: 24px; }
  .context, .screens-nav { max-width: 480px; justify-self: center; text-align: center; }
  .screens-nav button { text-align: left; }
}
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="mobile/screens.jsx"></script>

<script type="text/babel" data-presets="react">

const SCREENS = [
  { id: 'home', name: 'Home', desc: 'Hero, featured story, recent work, newsletter' },
  { id: 'index', name: 'Index', desc: 'All 47 stories, filter chips, list view' },
  { id: 'project', name: 'Project — Harreveld', desc: 'Podcast detail with episodes & sticky player' },
  { id: 'photo', name: 'Photo essay — Liever Stil', desc: 'Mosaic gallery with lightbox' },
];

function App() {
  const [screen, setScreen] = React.useState('home');
  const [tab, setTab] = React.useState('home');
  const [stack, setStack] = React.useState([]);

  const goHome = () => { setScreen('home'); setTab('home'); setStack([]); };
  const goIndex = () => { setScreen('index'); setTab('index'); setStack([]); };
  const onTab = (id) => {
    if (id === 'home') goHome();
    else if (id === 'index') goIndex();
    else { setScreen('simple-' + id); setTab(id); }
  };
  const openStory = (id) => {
    if (id === 'liever-stil') setScreen('photo');
    else setScreen('project:' + id);
  };
  const back = () => {
    if (tab === 'index') goIndex();
    else goHome();
  };

  // The main scrollable screen, inside the device
  let body;
  let showTabs = true;
  if (screen === 'home') {
    body = <HomeScreen onOpen={openStory} onTab={onTab} />;
  } else if (screen === 'index') {
    body = <IndexScreen onOpen={openStory} />;
  } else if (screen.startsWith('project:')) {
    const id = screen.split(':')[1];
    body = <ProjectScreen id={id} onBack={back} onOpen={openStory} />;
    showTabs = false;
  } else if (screen === 'photo') {
    body = <PhotoEssayScreen onBack={back} />;
    showTabs = false;
  } else if (screen === 'simple-saved') {
    body = <SimpleScreen title="Saved" kicker="Bookmarked stories" body="Stories you've bookmarked appear here for offline reading and listening. Stays private — nothing leaves the device." />;
  } else if (screen === 'simple-about') {
    body = <SimpleScreen title="About" kicker="Ontheground · Rotterdam" body="A small journalism production house. Documentary, reportage, photography, podcast. Slow, on the ground, with a notebook and a recorder." />;
  }

  // navigation buttons in left rail follow current screen
  const navActive = screen === 'home' ? 'home'
                  : screen === 'index' ? 'index'
                  : screen.startsWith('project') ? 'project'
                  : screen === 'photo' ? 'photo'
                  : null;

  return (
    <div className="stage">
      {/* LEFT — context */}
      <div className="context">
        <div className="brand">ontheground<span className="dot">.</span></div>
        <div className="kicker">Mobile prototype · v0.4</div>
        <h1>From newspaper<br/>to <em>the pocket.</em></h1>
        <p>The mobile site keeps the spirit of the system — paper tones, the rust dot, Archivo + Source Serif — and adapts ritme: 44pt tap targets, full-bleed media, a sticky audio player, a bottom tab bar.</p>
        <div className="meta">
          iPhone 15 Pro · 402 × 874<br/>
          4 screens · Tap nav at right<br/>
          April 2026
        </div>
      </div>

      {/* CENTER — device */}
      <div className="device-wrap">
        <IOSDevice width={402} height={874}>
          <div style={{
            position: 'absolute', inset: 0, top: 0,
            display: 'flex', flexDirection: 'column',
            paddingTop: 56,
          }}>
            <div style={{ flex: 1, overflow: 'auto', overscrollBehavior: 'contain' }} key={screen}>
              {body}
            </div>
            {showTabs && (
              <TabBar active={tab} onChange={onTab} />
            )}
          </div>
        </IOSDevice>
      </div>

      {/* RIGHT — screen picker */}
      <div className="screens-nav">
        <div className="label">Screens · click to view</div>
        {SCREENS.map((s, i) => {
          const active =
            (s.id === 'home' && screen === 'home') ||
            (s.id === 'index' && screen === 'index') ||
            (s.id === 'project' && screen.startsWith('project:')) ||
            (s.id === 'photo' && screen === 'photo');
          return (
            <button key={s.id}
              aria-pressed={active}
              onClick={() => {
                if (s.id === 'home') goHome();
                else if (s.id === 'index') goIndex();
                else if (s.id === 'project') { setScreen('project:harreveld'); setTab('home'); }
                else if (s.id === 'photo') { setScreen('photo'); setTab('home'); }
              }}
            >
              <span className="num">{String(i + 1).padStart(2, '0')}</span>
              <span>
                <span className="name" style={{display:'block'}}>{s.name}</span>
                <span className="desc">{s.desc}</span>
              </span>
            </button>
          );
        })}
        <div style={{
          marginTop: 28,
          fontFamily: 'JetBrains Mono, monospace',
          fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase',
          color: 'rgba(244,239,230,0.4)', lineHeight: 1.7,
        }}>
          Story cards in the device are also live —<br/>
          tap them to drill in.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
